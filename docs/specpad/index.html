<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>SpecPad — opening editor…</title>
    <script>
      // Redirect this local file to the version-pinned hosted editor.
      // A double-clicked file:// page cannot grant File System Access; the
      // hosted https page can. schemaVersion "1.0" -> editor build /v01/.
      (function () {
        var PROJECT = 'specpad';
        var params = new URLSearchParams(window.location.search);
        var open = params.get('open') || 'srs';
        // This launcher lives inside the project folder, so it knows that folder's
        // local path. Passing it lets the editor re-correlate a remembered folder
        // grant (and guide the first pick). It rides in the URL *fragment* (after
        // #), which the browser never sends to the server, so the path stays local.
        var dir = '';
        try {
          dir = decodeURIComponent(window.location.pathname).replace(/\/[^/]*$/, '');
        } catch (e) { dir = ''; }
        var frag =
          'name=' + encodeURIComponent(PROJECT) +
          '&open=' + encodeURIComponent(open) +
          (dir ? '&dir=' + encodeURIComponent(dir) : '');
        window.location.href = 'https://specpad.com/v01/#' + frag;
      })();
    </script>
  </head>
  <body>
    <p>Opening SpecPad… if nothing happens,
      <a href="https://specpad.com/v01/">click here</a>.</p>
  </body>
</html>
