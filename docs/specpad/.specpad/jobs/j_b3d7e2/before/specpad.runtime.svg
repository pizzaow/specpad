<svg xmlns="http://www.w3.org/2000/svg" width="760" height="180" viewBox="0 0 760 180" font-family="Helvetica, Arial, sans-serif" font-size="11">
  <rect width="760" height="180" fill="#ffffff"/>
  <text x="16" y="24" font-size="15" font-weight="bold">Runtime View — the working loop</text>

  <g>
    <rect x="20" y="70" width="120" height="50" rx="6" fill="#dbe7ff" stroke="#4a6fa5"/>
    <text x="80" y="92" text-anchor="middle" font-weight="bold">Define intent</text>
    <text x="80" y="108" text-anchor="middle" fill="#555">(conversation)</text>

    <rect x="170" y="70" width="120" height="50" rx="6" fill="#dbe7ff" stroke="#4a6fa5"/>
    <text x="230" y="92" text-anchor="middle" font-weight="bold">Capture spec</text>
    <text x="230" y="108" text-anchor="middle" fill="#555">req + test (job)</text>

    <rect x="320" y="70" width="120" height="50" rx="6" fill="#dbe7ff" stroke="#4a6fa5"/>
    <text x="380" y="92" text-anchor="middle" font-weight="bold">Implement</text>
    <text x="380" y="108" text-anchor="middle" fill="#555">code + tests</text>

    <rect x="470" y="70" width="120" height="50" rx="6" fill="#fff3cd" stroke="#b8860b"/>
    <text x="530" y="92" text-anchor="middle" font-weight="bold">Pre-push gate</text>
    <text x="530" y="108" text-anchor="middle" fill="#555">Job: trailer</text>

    <rect x="620" y="70" width="120" height="50" rx="6" fill="#d4edda" stroke="#3c763d"/>
    <text x="680" y="92" text-anchor="middle" font-weight="bold">Close → cache</text>
    <text x="680" y="108" text-anchor="middle" fill="#555">snapshots + commits</text>

    <line x1="140" y1="95" x2="168" y2="95" stroke="#555" marker-end="url(#a)"/>
    <line x1="290" y1="95" x2="318" y2="95" stroke="#555" marker-end="url(#a)"/>
    <line x1="440" y1="95" x2="468" y2="95" stroke="#555" marker-end="url(#a)"/>
    <line x1="590" y1="95" x2="618" y2="95" stroke="#555" marker-end="url(#a)"/>
  </g>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#555"/></marker></defs>
</svg>
